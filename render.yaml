services:
  # --- Backend: FastAPI ---
  - type: web
    name: pharma-complaint-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false                     # set manually in Render dashboard - never commit real keys
      - key: DATABASE_URL
        sync: false                     # set manually in Render dashboard - reusing an existing free Postgres instance,
                                         # pointed at a separate database (e.g. complaint_db) created inside it
      - key: CORS_ORIGINS
        sync: false                     # set manually after Vercel frontend is deployed, e.g.
                                         # https://your-project.vercel.app
databases:
  - name: pharma-complaint-db
    plan: free
    databaseName: complaint_db
    user: complaint_user

services:
  # --- Backend: FastAPI ---
  - type: web
    name: pharma-complaint-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false                     # set manually in Render dashboard - never commit real keys
      - key: DATABASE_URL
        fromDatabase:
          name: pharma-complaint-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://pharma-complaint-frontend.onrender.com   # update after frontend is deployed

  # --- Frontend: React static site ---
  - type: web
    name: pharma-complaint-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://pharma-complaint-backend.onrender.com   # update after backend is deployed
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
